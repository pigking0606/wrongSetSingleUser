name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 43.134.234.119
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            REPO_DIR="/www/wwwroot/wrongset"
            if [ -d "$REPO_DIR/.git" ]; then
              echo "==> git pull..."
              cd "$REPO_DIR"
              git pull origin main
            else
              echo "==> git clone..."
              git clone https://github.com/pigking0606/wrongSetSingleUser.git "$REPO_DIR"
              cd "$REPO_DIR"
            fi
            echo "==> running deploy script..."
            bash wrong.sh